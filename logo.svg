<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D2D"/>
      <stop offset="50%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#FF6633"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FF2D2D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0a0a" stroke="url(#circuitGrad)" stroke-width="3" opacity="0.9"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#FF2D2D" stroke-width="0.5" opacity="0.3"/>

  <!-- Circuit pattern on shell -->
  <g filter="url(#glow)" opacity="0.4">
    <line x1="180" y1="200" x2="220" y2="200" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="220" y1="200" x2="220" y2="240" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="280" y1="190" x2="320" y2="190" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="320" y1="190" x2="320" y2="220" stroke="#FFD700" stroke-width="1.5"/>
    <circle cx="220" cy="200" r="3" fill="#FFD700"/>
    <circle cx="320" cy="190" r="3" fill="#FFD700"/>
    <line x1="200" y1="300" x2="250" y2="300" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="260" y1="310" x2="310" y2="310" stroke="#8B5CF6" stroke-width="1"/>
  </g>

  <!-- Crayfish body -->
  <g transform="translate(256, 270)">
    <!-- Tail segments -->
    <ellipse cx="0" cy="60" rx="35" ry="15" fill="url(#bodyGrad)" opacity="0.7"/>
    <ellipse cx="0" cy="45" rx="40" ry="16" fill="url(#bodyGrad)" opacity="0.8"/>
    <ellipse cx="0" cy="28" rx="45" ry="18" fill="url(#bodyGrad)" opacity="0.9"/>

    <!-- Main body -->
    <ellipse cx="0" cy="0" rx="55" ry="35" fill="url(#bodyGrad)"/>

    <!-- Shell pattern (circuit-like) -->
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#FFD700" stroke-width="1.2" opacity="0.5"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
    <line x1="-25" y1="5" x2="25" y2="5" stroke="#FFD700" stroke-width="0.8" opacity="0.3"/>
    <circle cx="0" cy="-10" r="2" fill="#FFD700" opacity="0.6"/>

    <!-- Head -->
    <ellipse cx="0" cy="-45" rx="38" ry="28" fill="url(#bodyGrad)"/>

    <!-- Eyes -->
    <circle cx="-15" cy="-55" r="8" fill="#0a0a0a"/>
    <circle cx="15" cy="-55" r="8" fill="#0a0a0a"/>
    <circle cx="-15" cy="-55" r="5" fill="#FFD700" filter="url(#glow)"/>
    <circle cx="15" cy="-55" r="5" fill="#FFD700" filter="url(#glow)"/>
    <circle cx="-13" cy="-57" r="2" fill="#FFF"/>
    <circle cx="17" cy="-57" r="2" fill="#FFF"/>

    <!-- Antennae -->
    <path d="M-12,-70 Q-30,-110 -50,-120" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M12,-70 Q30,-110 50,-120" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-50" cy="-120" r="4" fill="#FFD700" filter="url(#glow)"/>
    <circle cx="50" cy="-120" r="4" fill="#FFD700" filter="url(#glow)"/>

    <!-- Left claw arm -->
    <path d="M-40,-25 L-85,-60 L-95,-45" fill="none" stroke="url(#bodyGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left claw -->
    <g transform="translate(-95, -50) rotate(-20)">
      <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#bodyGrad)" filter="url(#glow)"/>
      <path d="M15,-8 L35,-18 M15,8 L35,12" stroke="url(#bodyGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="-5" y1="0" x2="12" y2="0" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Right claw arm -->
    <path d="M40,-25 L85,-60 L95,-45" fill="none" stroke="url(#bodyGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right claw -->
    <g transform="translate(95, -50) rotate(20)">
      <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#bodyGrad)" filter="url(#glow)"/>
      <path d="M-15,-8 L-35,-18 M-15,8 L-35,12" stroke="url(#bodyGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="5" y1="0" x2="-12" y2="0" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Legs -->
    <g opacity="0.8">
      <line x1="-40" y1="5" x2="-60" y2="25" stroke="url(#bodyGrad)" stroke-width="3" stroke-linecap="round"/>
      <line x1="-38" y1="15" x2="-55" y2="35" stroke="url(#bodyGrad)" stroke-width="3" stroke-linecap="round"/>
      <line x1="40" y1="5" x2="60" y2="25" stroke="url(#bodyGrad)" stroke-width="3" stroke-linecap="round"/>
      <line x1="38" y1="15" x2="55" y2="35" stroke="url(#bodyGrad)" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- "AI" badge -->
  <g transform="translate(256, 270)" filter="url(#outerGlow)">
    <rect x="-18" y="-18" width="36" height="22" rx="6" fill="#0a0a0a" stroke="#FFD700" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" fill="#FFD700" font-family="Arial, sans-serif" font-size="14" font-weight="bold">AI</text>
  </g>

  <!-- Brand text -->
  <text x="256" y="410" text-anchor="middle" fill="#FFFFFF" font-family="'Noto Sans SC', Arial, sans-serif" font-size="36" font-weight="900" letter-spacing="4">
    A	™™~
  </text>
  <text x="256" y="445" text-anchor="middle" fill="#FFD700" font-family="Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="6" opacity="0.8">
    AI POWERED ASSISTANT
  </text>
</svg>
